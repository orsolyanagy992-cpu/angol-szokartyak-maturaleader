<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Szótanuló - Unit 11</title><style>
:root{--ink:#064e3b;--muted:#4b5563;--line:#a7f3d0;--panel:#fff;--green:#059669;--green-light:#ecfdf5;--success:#16a34a;--red:#b42318}*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--ink);background:#e6f4ea;padding:16px;transition:background .2s}
main{width:min(1100px,100%);margin:0 auto;transition:max-width .2s}header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
.header-left{flex:1;min-width:200px}h1{margin:0;font-size:28px}.stats{display:flex;gap:8px;align-items:center}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:6px 12px;text-align:center;font-size:13px}
.stat b{display:block;font-size:18px}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:16px}
input,select,button{min-height:38px;border:1px solid var(--line);border-radius:6px;background:var(--panel);padding:0 10px;font:inherit}
button{cursor:pointer;transition:background .1s}button:hover{background:#e6f4ea}button.primary{background:var(--green);color:#fff;border-color:var(--green)}
button.good{background:#eafaf1;color:var(--success);border-color:#afe0bd}button.hard{background:#fff1ed;color:var(--red);border-color:#fac7bd}
.layout{display:grid;grid-template-columns:1fr 300px;gap:16px;transition:grid-template-columns .2s}@media(max-width:800px){.layout,.toolbar{grid-template-columns:1fr}}
.study{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 4px 12px rgba(5,150,105,0.05)}
.progress{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-bottom:12px}
.progress span{display:block;height:100%;width:0;background:var(--green);transition:width .2s}
.card{position:relative;display:grid;place-items:center;min-height:260px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:20px;text-align:center;cursor:pointer;user-select:none;box-shadow:inset 0 0 40px rgba(5,150,105,0.02)}
.card small{position:absolute;top:8px;left:10px;color:var(--muted);font-size:11px;font-weight:700}
.term{font-size:30px;font-weight:700;line-height:1.2;margin-bottom:8px}.answer{color:var(--muted);font-size:16px}
.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}@media(max-width:500px){.actions{grid-template-columns:repeat(2,1fr)}.actions .primary{grid-column:span 2}}
.quiz{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}aside{display:grid;gap:12px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
.box h2{margin:0 0 8px;font-size:15px}.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:4px 10px;border-radius:12px;background:#e6f4ea;border:1px solid var(--line);cursor:pointer}
.chip.active{background:var(--green-light);color:#047857;border-color:#a7f3d0}
.list{max-height:280px;overflow-y:auto;display:grid;gap:4px}
.row{border:1px solid var(--line);border-radius:6px;padding:6px;background:#fff;cursor:pointer;text-align:left;font-size:13px}
.row b{display:block;color:var(--ink)}.row span{color:var(--muted)}

/* Egész képernyős mód */
body.fs-mode{background:#f0fdf4;padding-top:40px}
body.fs-mode main{width:min(750px,100%)}
body.fs-mode header .header-left, body.fs-mode aside{display:none !important}
body.fs-mode .layout{grid-template-columns:1fr}
#fsToggle{font-weight:bold;border-color:var(--green);color:var(--green)}
body.fs-mode #fsToggle{background:var(--green);color:#fff}
</style></head><body><main><header><div class="header-left"><h1>Unit 11 - Parts of the body, health and illnesses</h1></div><section class="stats"><button id="fsToggle" title="Teljes képernyő (F gomb)">⛶ Egész képernyő</button><div class="stat"><b id="sC">0</b><span>átvett</span></div><div class="stat"><b id="kC">0</b><span>tudom</span></div><div class="stat"><b id="hC">0</b><span>gyakorlom</span></div></section></header><section class="toolbar"><input id="search" type="search" placeholder="Keresés..."><select id="mode"><option value="cards">Kártyák</option><option value="quiz">Feleletválasztós</option></select><select id="direction"><option value="en-hu">Angol -> Magyar</option><option value="hu-en">Magyar -> Angol</option></select></section><section class="layout"><div><section class="study"><div class="progress"><span id="prog"></span></div><article id="card" class="card" tabindex="0"><small id="meta"></small><div><div id="term" class="term"></div><div id="ans" class="answer"></div></div></article><div id="quiz" class="quiz"></div><div class="actions"><button id="prev">Előző</button><button id="flip" class="primary">Fordítás</button><button id="next">Köv.</button><button id="bH" class="hard">Gyakorolni</button><button id="bK" class="good">Tudom</button></div></section></div><aside><section class="box"><h2>Témakörök</h2><div class="chips" id="filters"></div></section><section class="box"><h2>Szólista</h2><div class="list" id="wList"></div></section></aside></section></main><script>

const $=q=>document.querySelector(q);
const els={
  s: $('#search'), m: $('#mode'), d: $('#direction'), f: $('#filters'), wl: $('#wList'),
  c: $('#card'), mt: $('#meta'), tm: $('#term'), an: $('#ans'), qz: $('#quiz'),
  pr: $('#prog'), sC: $('#sC'), kC: $('#kC'), hC: $('#hC'), fs: $('#fsToggle')
};

let state={}, activeT='Mind', idx=0, flipped=false;
const sKey='szokartyak-u11-st';
try{state=JSON.parse(localStorage.getItem(sKey))||{}}catch(e){state={}}
function save(){localStorage.setItem(sKey,JSON.stringify(state))}
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}

function toggleFullscreen(){
  document.body.classList.toggle('fs-mode');
  if(document.body.classList.contains('fs-mode')){
    els.fs.textContent='🗗 Normál nézet';
  }else{
    els.fs.textContent='⛶ Egész képernyő';
  }
}
els.fs.onclick=toggleFullscreen;

function getFiltered(){
  const q=els.s.value.trim().toLowerCase();
  return cards.filter(c=>(activeT==='Mind'||c.topic===activeT)&&(!q||`${c.en} ${c.hu}`.toLowerCase().includes(q)));
}
function getFB(c){return els.d.value==='en-hu'?[c.en,c.hu,'Angol']:[c.hu,c.en,'Magyar']}

function mark(k){
  const c=getFiltered()[idx];if(!c)return;
  state[c.id]={...(state[c.id]||{}),seen:true,[k]:true};
  if(k==='known')state[c.id].hard=false;
  if(k==='hard')state[c.id].known=false;
  save();next();render();
}

function render(){
  const list=getFiltered();
  if(list.length && idx>=list.length)idx=0;
  const c=list[idx]||list[0];
  
  els.f.innerHTML='';
  ["Mind","Parts of the body","Accidents","Health problems and diseases","Symptoms and treatment","Disability","Addictions","At the doctor's / In hospital"].forEach(t=>{
    const b=document.createElement('button');b.className='chip'+(t===activeT?' active':'');
    b.textContent=t==='Mind'?`Mind (${cards.length})`:t;
    b.onclick=()=>{activeT=t;idx=0;flipped=false;render()};els.f.append(b);
  });

  els.wl.innerHTML='';
  list.forEach((w,p)=>{
    const r=document.createElement('button');r.className='row';
    r.innerHTML=`<b>${w.en}</b><span>${w.hu}</span>`;
    r.onclick=()=>{idx=p;flipped=false;render()};els.wl.append(r);
  });

  if(!list.length){
    els.tm.textContent='Nincs találat';els.an.textContent='';els.mt.textContent='';
    els.qz.innerHTML='';els.pr.style.width='0%';return;
  }
  const [f,b,l]=getFB(c);
  els.mt.textContent=`${idx+1} / ${list.length} - ${l} [${c.topic}]`;
  els.tm.textContent=flipped?b:f;
  els.an.textContent=flipped?f:'Kattints ide a fordításhoz';
  els.pr.style.width=`${((idx+1)/list.length)*100}%`;
  
  state[c.id]={...(state[c.id]||{}),seen:true};save();

  els.qz.innerHTML='';
  if(els.m.value==='quiz'){
    els.qz.style.display='grid';els.c.style.cursor='default';
    const pool=cards.filter(x=>x.id!==c.id);
    const choices=shuffle([b,...shuffle(pool).slice(0,3).map(x=>els.d.value==='en-hu'?x.hu:x.en)]);
    choices.forEach(ch=>{
      const btn=document.createElement('button');btn.textContent=ch;
      btn.onclick=()=>{flipped=true;mark(ch===b?'known':'hard')};els.qz.append(btn);
    });
  }else{els.qz.style.display='none';els.c.style.cursor='pointer'}

  const v=Object.values(state);
  els.sC.textContent=v.filter(x=>x.seen).length;
  els.kC.textContent=v.filter(x=>x.known).length;
  els.hC.textContent=v.filter(x=>x.hard).length;
}

function next(){const len=getFiltered().length;if(len)idx=(idx+1)%len;flipped=false}
els.c.onclick=()=>{if(els.m.value==='cards'){flipped=!flipped;render()}};
$('#flip').onclick=()=>{flipped=!flipped;render()};
$('#next').onclick=()=>{next();render()};
$('#prev').onclick=()=>{const len=getFiltered().length;if(len)idx=(idx-1+len)%len;flipped=false;render()};
$('#bK').onclick=()=>mark('known');$('#bH').onclick=()=>mark('hard');
els.s.oninput=()=>{idx=0;flipped=false;render()};
els.m.onchange=els.d.onchange=()=>{flipped=false;render()};

document.onkeydown=e=>{
  if(e.target.matches('input,select'))return;
  if(e.key==='ArrowRight'){next();render()}
  if(e.key==='ArrowLeft')$('#prev').click();
  if(e.key===' '){e.preventDefault();$('#flip').click()}
  if(e.key.toLowerCase()==='f'){e.preventDefault();toggleFullscreen()}
};
render();
</script></body></html>
