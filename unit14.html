<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Szótanuló - Unit 14</title><style>
:root{--ink:#292524;--muted:#78716c;--line:#e7e5e4;--panel:#fff;--orange:#ea580c;--orange-light:#ffedd5;--green:#16a34a;--red:#b42318}*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--ink);background:#fef08a;padding:16px;transition:background .2s}
main{width:min(1100px,100%);margin:0 auto;transition:max-width .2s}header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
.header-left{flex:1;min-width:200px}h1{margin:0;font-size:28px}.stats{display:flex;gap:8px;align-items:center}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:6px 12px;text-align:center;font-size:13px}
.stat b{display:block;font-size:18px}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:16px}
input,select,button{min-height:38px;border:1px solid var(--line);border-radius:6px;background:var(--panel);padding:0 10px;color:var(--ink);font:inherit}
button{cursor:pointer;transition:background .1s}button:hover{background:#f5f5f4}button.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
button.primary:hover{background:#ea580cde}button.good{background:#f0fdf4;color:var(--green);border-color:#bbf7d0}button.hard{background:#fef2f2;color:var(--red);border-color:#fecaca}
.layout{display:grid;grid-template-columns:1fr 300px;gap:16px;transition:grid-template-columns .2s}@media(max-width:850px){.layout,.toolbar{grid-template-columns:1fr}}
.study{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
.progress{height:6px;background:#f5f5f4;border-radius:3px;overflow:hidden;margin-bottom:12px}
.progress span{display:block;height:100%;width:0;background:var(--orange);transition:width .2s}
.card{position:relative;display:grid;place-items:center;min-height:260px;border:1px solid var(--line);border-radius:6px;background:#fafaf9;padding:20px;text-align:center;cursor:pointer;user-select:none}
.card small{position:absolute;top:8px;left:10px;color:var(--muted);font-size:11px;font-weight:bold}
.term{font-size:30px;font-weight:700;line-height:1.2;margin-bottom:8px}.answer{color:var(--muted);font-size:16px}
.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}@media(max-width:500px){.actions{grid-template-columns:repeat(2,1fr)}.actions .primary{grid-column:span 2}}
.quiz{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}aside{display:grid;gap:12px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
.box h2{margin:0 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:4px 10px;border-radius:12px;background:#f5f5f4;border:1px solid var(--line);cursor:pointer}
.chip.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange)}
.list{max-height:280px;overflow-y:auto;display:grid;gap:4px}
.row{border:1px solid var(--line);border-radius:6px;padding:6px;background:#fafaf9;cursor:pointer;text-align:left;font-size:13px}
.row b{display:block;color:var(--ink)}.row span{color:var(--muted)}

body.fs-mode{background:#fde047;padding-top:40px}body.fs-mode main{width:min(750px,100%)}
body.fs-mode header .header-left, body.fs-mode aside{display:none !important}
body.fs-mode .layout{grid-template-columns:1fr}
#fsToggle{font-weight:bold;border-color:var(--orange);color:var(--orange)}
body.fs-mode #fsToggle{background:var(--orange);color:#fff}
</style></head><body><main><header><div class="header-left"><h1>Unit 14</h1><p style="margin:4px 0 0;color:var(--muted);font-size:14px">Interaktív gyakorló a szójegyzék anyagából.</p></div><section class="stats"><button id="fsToggle">⛶ Egész képernyő</button><div class="stat"><b id="sC">0</b><span>átvett</span></div><div class="stat"><b id="kC">0</b><span>tudom</span></div><div class="stat"><b id="hC">0</b><span>gyakorlom</span></div></section></header><section class="toolbar"><input id="search" type="search" placeholder="Keresés..."><select id="mode"><option value="cards">Kártyák</option><option value="quiz">Feleletválasztós</option></select><select id="direction"><option value="en-hu">Angol -> Magyar</option><option value="hu-en">Magyar -> Angol</option></select></section><section class="layout"><div><section class="study"><div class="progress"><span id="prog"></span></div><article id="card" class="card" tabindex="0"><small id="meta"></small><div><div id="term" class="term"></div><div id="ans" class="answer"></div></div></article><div id="quiz" class="quiz"></div><div class="actions"><button id="prev">Előző</button><button id="flip" class="primary">Fordítás</button><button id="next">Köv.</button><button id="bH" class="hard">Gyakorolni</button><button id="bK" class="good">Tudom</button></div></section></div><aside><section class="box"><h2>Részlegek</h2><div class="chips" id="filters"></div></section><section class="box"><h2>Szólista</h2><div class="list" id="wList"></div></section></aside></section></main><script>
const cards=[
  {id:1,en:"murder / killing",hu:"gyilkosság",topic:"Crimes"},{id:2,en:"shoplifting",hu:"bolti lopás",topic:"Crimes"},{id:3,en:"burglary",hu:"betörés",topic:"Crimes"},{id:4,en:"mugging",hu:"utcai rablótámadás",topic:"Crimes"},{id:5,en:"pickpocketing",hu:"zsebtolvajlás",topic:"Crimes"},{id:6,en:"robbery",hu:"rablás",topic:"Crimes"},{id:7,en:"drug dealing",hu:"drogkereskedelem",topic:"Crimes"},{id:8,en:"arson",hu:"gyújtogatás",topic:"Crimes"},{id:9,en:"stalking",hu:"zaklatás",topic:"Crimes"},{id:10,en:"smuggling",hu:"csempészet",topic:"Crimes"},{id:11,en:"rape",hu:"nemi erőszak",topic:"Crimes"},{id:12,en:"blackmail",hu:"zsarolás",topic:"Crimes"},{id:13,en:"kidnapping",hu:"emberrablás",topic:"Crimes"},{id:14,en:"theft",hu:"lopás",topic:"Crimes"},{id:15,en:"hijacking",hu:"repülőgépeltérítés",topic:"Crimes"},{id:16,en:"terrorism",hu:"terrorizmus",topic:"Crimes"},{id:17,en:"forgery",hu:"hamisítás",topic:"Crimes"},{id:18,en:"vandalism",hu:"vandalizmus",topic:"Crimes"},{id:19,en:"organised crime",hu:"szervezett bűnözés",topic:"Crimes"},{id:20,en:"petty crime",hu:"piti bűnözés",topic:"Crimes"},{id:21,en:"inside job",hu:"beépített tettestárs segítségével elkövetett bűncselekmény",topic:"Crimes"},{id:22,en:"kidnap attempt",hu:"emberrablási kísérlet",topic:"Crimes"},{id:23,en:"hostage",hu:"túsz",topic:"Crimes"},{id:24,en:"ransom",hu:"váltságdíj",topic:"Crimes"},{id:25,en:"refugee",hu:"menekült",topic:"Crimes"},{id:26,en:"bomb attack",hu:"bombatámadás",topic:"Crimes"},{id:27,en:"threaten",hu:"fenyeget",topic:"Crimes"},{id:28,en:"accept a bribe",hu:"kenőpénzt fogad el",topic:"Crimes"},{id:29,en:"child labour",hu:"gyermekmunka",topic:"Crimes"},{id:30,en:"commit suicide",hu:"öngyilkosságot követ el",topic:"Crimes"},{id:31,en:"racism",hu:"rasszizmus",topic:"Crimes"},{id:32,en:"speeding",hu:"gyorshajtás",topic:"Crimes"},
  {id:33,en:"murderer / killer",hu:"gyilkos",topic:"Criminals"},{id:34,en:"shoplifter",hu:"bolti tolvaj",topic:"Criminals"},{id:35,en:"burglar",hu:"betörő",topic:"Criminals"},{id:36,en:"mugger",hu:"utcai rabló",topic:"Criminals"},{id:37,en:"pickpocket",hu:"zsebtolvaj",topic:"Criminals"},{id:38,en:"robber",hu:"rabló",topic:"Criminals"},{id:39,en:"drug dealer",hu:"drogkereskedő",topic:"Criminals"},{id:40,en:"arsonist",hu:"gyújtogató",topic:"Criminals"},{id:41,en:"stalker",hu:"zaklató",topic:"Criminals"},{id:42,en:"smuggler",hu:"csempész",topic:"Criminals"},{id:43,en:"rapist",hu:"erőszaktevő",topic:"Criminals"},{id:44,en:"blackmailer",hu:"zsaroló",topic:"Criminals"},{id:45,en:"kidnapper",hu:"emberrabló",topic:"Criminals"},{id:46,en:"thief / thieves",hu:"tolvaj / tolvajok",topic:"Criminals"},{id:47,en:"hijacker",hu:"gépeltérítő",topic:"Criminals"},{id:48,en:"terrorist",hu:"terrorista",topic:"Criminals"},{id:49,en:"forger",hu:"hamisító",topic:"Criminals"},{id:50,en:"vandal",hu:"vandál",topic:"Criminals"},{id:51,en:"offender",hu:"szabálysértő / bűnelkövető",topic:"Criminals"},{id:52,en:"suspect",hu:"gyanúsított",topic:"Criminals"},{id:53,en:"criminal",hu:"bűnöző",topic:"Criminals"},{id:54,en:"accomplice",hu:"bűntárs / tettestárs",topic:"Criminals"},{id:55,en:"vandalise",hu:"vandalizál / megrongál",topic:"Criminals"},
  {id:56,en:"break the law",hu:"megszegi a törvényt",topic:"The Law"},{id:57,en:"obey the law",hu:"betartja a törvényt",topic:"The Law"},{id:58,en:"respect the law",hu:"tiszteli a törvényt",topic:"The Law"},{id:59,en:"against the law",hu:"törvényellenes",topic:"The Law"},{id:60,en:"commit a crime",hu:"bűntényt követ el",topic:"The Law"},{id:61,en:"commit an offence",hu:"szabálysértést követ el",topic:"The Law"},{id:62,en:"commit fraud",hu:"csalást követ el",topic:"The Law"},{id:63,en:"guilty",hu:"bűnös",topic:"The Law"},{id:64,en:"innocent",hu:"ártatlan",topic:"The Law"},{id:65,en:"accuse sb of sth",hu:"vádol valakit valamivel",topic:"The Law"},{id:66,en:"arrest",hu:"letartóztat",topic:"The Law"},{id:67,en:"investigation",hu:"nyomozás",topic:"The Law"},{id:68,en:"charge sb with sth",hu:"megvádol valakit valamivel",topic:"The Law"},{id:69,en:"be charged with sth",hu:"megvádolják valamivel",topic:"The Law"},{id:70,en:"evidence / proof",hu:"bizonyíték",topic:"The Law"},{id:71,en:"prove",hu:"bizonyít",topic:"The Law"},{id:72,en:"crime rate",hu:"bűnözési arány (szám)",topic:"The Law"},{id:73,en:"crime wave",hu:"bűnözési hullám",topic:"The Law"},{id:74,en:"punishment",hu:"büntetés",topic:"The Law"},{id:75,en:"sentence sb",hu:"elítél valakit",topic:"The Law"},{id:76,en:"serve a sentence",hu:"börtönbüntetést tölt",topic:"The Law"},{id:77,en:"witness",hu:"szemtanú",topic:"The Law"},{id:78,en:"investigate",hu:"nyomoz",topic:"The Law"},{id:79,en:"court",hu:"bíróság",topic:"The Law"},{id:80,en:"judge",hu:"bíró / ítélkezni",topic:"The Law"},{id:81,en:"jury",hu:"esküdtszék",topic:"The Law"},{id:82,en:"fair trial",hu:"tisztességes eljárás",topic:"The Law"},{id:83,en:"unfair trial",hu:"tisztességtelen eljárás",topic:"The Law"},{id:84,en:"appear in court",hu:"megjelenik a bíróság előtt",topic:"The Law"},{id:85,en:"defence",hu:"védelem",topic:"The Law"},{id:86,en:"prosecution",hu:"bűnvádi eljárás / vád",topic:"The Law"},{id:87,en:"prison / jail",hu:"börtön",topic:"The Law"},{id:88,en:"capital punishment / the death penalty",hu:"halálbüntetés",topic:"The Law"},{id:89,en:"life sentence / imprisonment",hu:"életfogytiglani ítélet / szabadságvesztés",topic:"The Law"},{id:90,en:"conviction",hu:"ítélet / elítélés",topic:"The Law"},{id:91,en:"be convicted for sth",hu:"elítélik valamiért",topic:"The Law"}
];

const $=q=>document.querySelector(q);
const els={
  s: $('#search'), m: $('#mode'), d: $('#direction'), f: $('#filters'), wl: $('#wList'),
  c: $('#card'), mt: $('#meta'), tm: $('#term'), an: $('#ans'), qz: $('#quiz'),
  pr: $('#prog'), sC: $('#sC'), kC: $('#kC'), hC: $('#hC'), fs: $('#fsToggle')
};

let state={}, activeT='Mind', idx=0, flipped=false;
const sKey='szokartyak-u14-st';
try{state=JSON.parse(localStorage.getItem(sKey))||{}}catch(e){state={}}
function save(){localStorage.setItem(sKey,JSON.stringify(state))}
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}

function toggleFullscreen(){
  document.body.classList.toggle('fs-mode');
  if(document.body.classList.contains('fs-mode')){
    els.fs.textContent='🗗 Normál nézet';
  }else{
    els.fs.textContent='⛶ Egész képernyő';
  }
}
els.fs.onclick=toggleFullscreen;

function getFiltered(){
  const q=els.s.value.trim().toLowerCase();
  return cards.filter(c=>(activeT==='Mind'||c.topic===activeT)&&(!q||`${c.en} ${c.hu}`.toLowerCase().includes(q)));
}
function getFB(c){return els.d.value==='en-hu'?[c.en,c.hu,'Angol']:[c.hu,c.en,'Magyar']}

function mark(k){
  const c=getFiltered()[idx];if(!c)return;
  state[c.id]={...(state[c.id]||{}),seen:true,[k]:true};
  if(k==='known')state[c.id].hard=false;
  if(k==='hard')state[c.id].known=false;
  save();next();render();
}

function render(){
  const list=getFiltered();
  if(list.length && idx>=list.length)idx=0;
  const c=list[idx]||list[0];
  
  els.f.innerHTML='';
  ["Mind","Crimes","Criminals","The Law"].forEach(t=>{
    const b=document.createElement('button');b.className='chip'+(t===activeT?' active':'');
    b.textContent=t==='Mind'?`Mind (${cards.length})`:t;
    b.onclick=()=>{activeT=t;idx=0;flipped=false;render()};els.f.append(b);
  });

  els.wl.innerHTML='';
  list.forEach((w,p)=>{
    const r=document.createElement('button');r.className='row';
    r.innerHTML=`<b>${w.en}</b><span>${w.hu}</span>`;
    r.onclick=()=>{idx=p;flipped=false;render()};els.wl.append(r);
  });

  if(!list.length){
    els.tm.textContent='Nincs találat';els.an.textContent='';els.mt.textContent='';
    els.qz.innerHTML='';els.pr.style.width='0%';return;
  }
  const [f,b,l]=getFB(c);
  els.mt.textContent=`${idx+1} / ${list.length} - ${l} [${c.topic}]`;
  els.tm.textContent=flipped?b:f;
  els.an.textContent=flipped?f:'Kattints ide a fordításhoz';
  els.pr.style.width=`${((idx+1)/list.length)*100}%`;
  
  state[c.id]={...(state[c.id]||{}),seen:true};save();

  els.qz.innerHTML='';
  if(els.m.value==='quiz'){
    els.qz.style.display='grid';els.c.style.cursor='default';
    const pool=cards.filter(x=>x.id!==c.id);
    const choices=shuffle([b,...shuffle(pool).slice(0,3).map(x=>els.d.value==='en-hu'?x.hu:x.en)]);
    choices.forEach(ch=>{
      const btn=document.createElement('button');btn.textContent=ch;
      btn.onclick=()=>{flipped=true;mark(ch===b?'known':'hard')};els.qz.append(btn);
    });
  }else{els.qz.style.display='none';els.c.style.cursor='pointer'}

  const v=Object.values(state);
  els.sC.textContent=v.filter(x=>x.seen).length;
  els.kC.textContent=v.filter(x=>x.known).length;
  els.hC.textContent=v.filter(x=>x.hard).length;
}

function next(){const len=getFiltered().length;if(len)idx=(idx+1)%len;flipped=false}
els.c.onclick=()=>{if(els.m.value==='cards'){flipped=!flipped;render()}};
$('#flip').onclick=()=>{flipped=!flipped;render()};
$('#next').onclick=()=>{next();render()};
$('#prev').onclick=()=>{const len=getFiltered().length;if(len)idx=(idx-1+len)%len;flipped=false;render()};
$('#bK').onclick=()=>mark('known');$('#bH').onclick=()=>mark('hard');
els.s.oninput=()=>{idx=0;flipped=false;render()};
els.m.onchange=els.d.onchange=()=>{flipped=false;render()};

document.onkeydown=e=>{
  if(e.target.matches('input,select'))return;
  if(e.key==='ArrowRight'){next();render()}
  if(e.key==='ArrowLeft')$('#prev').click();
  if(e.key===' '){e.preventDefault();$('#flip').click()}
  if(e.key.toLowerCase()==='f'){e.preventDefault();toggleFullscreen()}
};
render();
</script></body></html>
